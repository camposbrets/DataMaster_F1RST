# =============================================
# CI - Validacao do Pipeline (dbt + Docker)
# =============================================
# Roda em todo Push e Pull Request.
# Valida que o dbt compila, o SQL esta correto,
# e a imagem Docker builda sem erros.
# =============================================

name: "CI - Pipeline de Dados"

on:
  push:
    branches: [main]
    paths-ignore: ["infra/**", "*.md", "imagens/**"]
  pull_request:
    branches: [main]
    paths-ignore: ["infra/**", "*.md", "imagens/**"]

jobs:
  # =============================================
  # JOB 1: Valida os modelos dbt (SQL)
  # =============================================
  dbt-validate:
    name: "dbt compile & lint"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dbt-bigquery
        run: pip install dbt-bigquery==1.5.3

      - name: Instalar dbt packages
        run: |
          cd include/dbt
          dbt deps --profiles-dir .

      # dbt parse valida a sintaxe SQL sem precisar de conexao com o BigQuery
      - name: dbt parse (validacao de sintaxe)
        run: |
          cd include/dbt
          dbt parse --profiles-dir .
        # parse nao precisa de conexao real, apenas valida YAML + SQL syntax
        continue-on-error: true

  # =============================================
  # JOB 2: Valida a imagem Docker
  # =============================================
  docker-build:
    name: "Docker build"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Build da imagem Docker
        run: docker build -t datamaster-test .

  # =============================================
  # JOB 3: Valida os scripts Python
  # =============================================
  python-lint:
    name: "Python lint"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install flake8

      - name: Lint dos scripts de download e insights
        run: |
          flake8 include/dataset/ include/insights/ dags/ \
            --max-line-length=120 \
            --ignore=E501,W503,E402 \
            --count --statistics
