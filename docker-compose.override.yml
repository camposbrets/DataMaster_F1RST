version: "3.1"
services:
  metabase:
    image: metabase/metabase:v0.50.24
    volumes:
      - ./include/metabase-data:/metabase-data
    environment:
      - MB_DB_FILE=/metabase-data/metabase.db
      - MB_MAPS_ENABLED=true
      - MB_MAPS_PROVIDER=google
      - MB_GOOGLE_MAPS_API_KEY=YOUR_GOOGLE_MAPS_API_KEY
    ports:
      - 3000:3000
    restart: always